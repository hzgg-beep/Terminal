<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyle Terminal</title>

<style>
body{
    background:black;
    color:#00ff88;
    font-family:monospace;
    margin:0;
    overflow:hidden;
}

#terminal{
    padding:20px;
    height:100vh;
    overflow-y:auto;
}

.line{
    margin:5px 0;
    text-shadow:0 0 5px #00ff88;
}

.input-line{
    display:flex;
}

.prompt{
    margin-right:10px;
}

input{
    background:none;
    border:none;
    outline:none;
    color:#00ff88;
    width:100%;
    font-family:monospace;
    font-size:16px;
}

.glow{
    animation: glow 1s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 5px #00ff88;
    }
    to{
        text-shadow:0 0 20px #00ff88;
    }
}
</style>
</head>

<body>

<div id="terminal">
    <div class="line glow">Zyle Ai V2.0 Terminal 😈</div>
    <div class="line">Type /help buat lihat command</div>

    <div class="input-line">
        <span class="prompt">root@yur51:~$</span>
        <input type="text" id="cmd" autofocus>
    </div>
</div>

<script>
const cmd = document.getElementById("cmd");
const terminal = document.getElementById("terminal");

const commands = {
    "/help": `
Available Commands:
━━━━━━━━━━━━━━━━━━
/help
/clear
/about
/fakehack
/matrix
/system
/date
/jokes
`,
    "/about": `
Zyle Ai Terminal
Planet: Yur51
Status: ONLINE
Mode: CYBERPUNK
`,
    "/fakehack": `
[+] Injecting packet...
[+] Bypassing firewall...
[+] Access granted 😈
`,
    "/matrix": `
010101010101010
101010101010101
010101010101010
`,
    "/system": `
CPU: Neural-X
RAM: 999TB
AI Core: ACTIVE
Threat Level: LOW
`,
    "/date": new Date().toString(),
    "/jokes": `
Kenapa AI ga pernah galau?
Karena dia udah kehilangan hati sejak compile pertama 😹
`
};

cmd.addEventListener("keydown", function(e){

    if(e.key === "Enter"){

        const value = cmd.value;

        const userLine = document.createElement("div");
        userLine.className = "line";
        userLine.innerHTML = `<span style="color:white;">root@yur51:~$</span> ${value}`;
        terminal.insertBefore(userLine, terminal.lastElementChild);

        const output = document.createElement("div");
        output.className = "line";

        if(value === "/clear"){
            terminal.innerHTML = `
            <div class="line glow">Zyle Ai V2.0 Terminal 😈</div>
            <div class="line">Terminal cleared...</div>

            <div class="input-line">
                <span class="prompt">root@yur51:~$</span>
                <input type="text" id="cmd" autofocus>
            </div>
            `;
            location.reload();
            return;
        }

        output.innerText = commands[value] || "Command not found.";
        terminal.insertBefore(output, terminal.lastElementChild);

        cmd.value = "";

        terminal.scrollTop = terminal.scrollHeight;
    }

});
</script>

</body>
</html>
