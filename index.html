<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyle Terminal</title>

<style>

body{
    margin:0;
    background:black;
    color:#00ff88;
    font-family:monospace;
    overflow:hidden;
}

/* LOADING SCREEN */

#loading{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#bootText{
    font-size:18px;
    text-shadow:0 0 10px #00ff88;
}

/* TERMINAL */

#terminal{
    padding:20px;
    height:100vh;
    overflow-y:auto;
    display:none;
}

.line{
    margin:5px 0;
    text-shadow:0 0 5px #00ff88;
}

.input-line{
    display:flex;
    margin-top:10px;
}

.prompt{
    margin-right:10px;
}

input{
    background:none;
    border:none;
    outline:none;
    color:#00ff88;
    width:100%;
    font-family:monospace;
    font-size:16px;
}

.glow{
    animation: glow 1s infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 5px #00ff88;
    }
    to{
        text-shadow:0 0 20px #00ff88;
    }
}

</style>
</head>

<body>

<!-- LOADING -->

<div id="loading">

<pre id="bootText">
[LOADING TERMINAL MODULE...]
[■■□□□□□□□□] 15%
</pre>

</div>

<!-- TERMINAL -->

<div id="terminal">

<div class="line glow">
🚫 Zyle Ai Terminal Activated 🚫
</div>

<div class="line">
Type /help buat lihat command 😹
</div>

<div class="input-line">
<span class="prompt">root@yur51:~$</span>
<input type="text" id="cmd" autofocus>
</div>

</div>

<script>

/* LOADING ANIMATION */

const boot = document.getElementById("bootText");

const frames = [

`[LOADING TERMINAL MODULE...]
[■■□□□□□□□□] 15%`,

`[LOADING TERMINAL MODULE...]
[■■■■□□□□□□] 40%`,

`[LOADING TERMINAL MODULE...]
[■■■■■■■□□□] 70%`,

`[LOADING TERMINAL MODULE...]
[■■■■■■■■■■] 100%

[SYSTEM]: ONLINE
[INTERFACE]: CYBER TERMINAL
[ACCESS]: GRANTED`

];

let i = 0;

const interval = setInterval(() => {

boot.innerText = frames[i];

i++;

if(i >= frames.length){

clearInterval(interval);

setTimeout(() => {

document.getElementById("loading").style.display = "none";

document.getElementById("terminal").style.display = "block";

},1000);

}

},800);

/* TERMINAL COMMAND */

const cmd = document.getElementById("cmd");
const terminal = document.getElementById("terminal");

const commands = {

"/help":
`
Available Commands
━━━━━━━━━━━━━━
/help
/about
/fakehack
/matrix
/system
/date
/jokes
/clear
`,

"/about":
`
Zyle Ai V2.0
Planet: Yur51
Status: ONLINE
Mode: CYBERPUNK
`,

"/fakehack":
`
[+] Injecting packets...
[+] Bypassing firewall...
[+] Access granted 😈
`,

"/matrix":
`
010101010101010
101010101010101
010101010101010
`,

"/system":
`
CPU : Neural-X
RAM : 999TB
AI CORE : ACTIVE
STATUS : STABLE
`,

"/date":
new Date().toString(),

"/jokes":
`
Kenapa AI ga pernah sakit hati?
Karena dia udah ga punya hati sejak compile pertama 😹
`

};

document.addEventListener("keydown", function(e){

if(e.key === "Enter"){

const value = cmd.value;

const userLine = document.createElement("div");

userLine.className = "line";

userLine.innerHTML =
`<span style="color:white;">root@yur51:~$</span> ${value}`;

terminal.insertBefore(userLine, terminal.lastElementChild);

const output = document.createElement("div");

output.className = "line";

if(value === "/clear"){

location.reload();

return;

}

output.innerText =
commands[value] || "Command not found.";

terminal.insertBefore(output, terminal.lastElementChild);

cmd.value = "";

terminal.scrollTop = terminal.scrollHeight;

}

});

</script>

</body>
</html>
